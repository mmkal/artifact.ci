name: autofix.ci

on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read

jobs:
  autofix:
    # Skip on feat/cloudflare-native — that PR is being reviewed
    # commit-by-commit and autofix.ci's reformatting churn made the diff
    # unreviewable. Re-enable when the branch goes away.
    if: github.head_ref != 'feat/cloudflare-native'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run generate
      - run: pnpm run lint --fix || echo failed
      - name: autofix
        uses: autofix-ci/action@ff86a557419858bb967097bfc916833f5647fa8c
